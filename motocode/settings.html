<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoMatch - Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
</head>
<body data-page="settings">
<div x-data="motoApp()" x-init="init()" class="page">
  <!-- TOASTS -->
  <div class="toast-container">
    <template x-for="t in toasts" :key="t.id">
      <div class="toast" :class="t.type">
        <i :class="t.type==='success'?'fas fa-check-circle':t.type==='error'?'fas fa-times-circle':'fas fa-info-circle'"></i>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

  <div class="modal-bg" x-show="editModal" x-cloak>
    <div class="modal" @click.stop>
      <h2>Edit Profile</h2>
      <div class="form-group">
        <label class="form-label">PROFILE PHOTO</label>
        <div class="avatar-upload-wrap">
          <img :src="profileImg" alt="Profile photo" class="avatar-upload-img">
          <label class="avatar-upload-label">
            <i class="fas fa-camera"></i> Upload New Photo
            <input type="file" accept="image/*" style="display:none" @change="onAvatarSelect($event)">
          </label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">DISPLAY NAME</label>
        <div class="input-wrap"><i class="fas fa-user icon"></i><input class="form-input" x-model="editName" placeholder="Your name"></div>
      </div>
      <div class="form-group">
        <label class="form-label">PHONE NUMBER</label>
        <div class="input-wrap"><i class="fas fa-phone icon"></i><input class="form-input" x-model="editPhone" placeholder="09xxxxxxxxx"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" @click="editModal=false">Cancel</button>
        <button class="btn-save" @click="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="app-shell" x-cloak>
    <!-- Sidebar -->
    <div class="sidebar" :class="showMenu?'open':''">
      <div class="sidebar-head">
        <div class="sidebar-logo"><i class="fas fa-motorcycle"></i></div>
        <div class="sidebar-brand"><h2>MOTO</h2><p>MATCH</p></div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn" :class="page==='dashboard'?'active':''" @click="go('dashboard')"><i class="fas fa-home"></i> Dashboard</button>
        <button class="nav-btn" :class="page==='scanner'?'active':''" @click="go('scanner')"><i class="fas fa-camera"></i> Scan Parts</button>
        <button class="nav-btn" :class="page==='need'?'active':''" @click="go('need')"><i class="fas fa-cart-plus"></i> Need To Buy</button>
        <button class="nav-btn" :class="page==='broken'?'active':''" @click="go('broken')"><i class="fas fa-wrench"></i> Broken Parts</button>
        <button class="nav-btn" :class="page==='profile'?'active':''" @click="go('profile')"><i class="fas fa-user"></i> Profile</button>
        <button class="nav-btn" :class="page==='settings'?'active':''" @click="go('settings')"><i class="fas fa-cog"></i> Settings</button>
      </nav>
      <div class="sidebar-foot">
        <button class="btn-logout-side" @click="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div class="sidebar-overlay" :class="showMenu?'open':''" @click="showMenu=false"></div>

    <div class="main">
      <div class="topbar">
        <button class="btn-menu" @click="showMenu=!showMenu"><i class="fas fa-bars"></i></button>
        <span class="page-title" x-text="pageTitle()"></span>
        <div class="topbar-right">
          <div class="notification-wrap">
            <button class="topbar-btn notification-btn" @click="toggleNotifications()" title="Notifications">
              <i class="fas fa-bell"></i>
              <span class="notification-count" x-show="unreadNotifications()>0" x-text="unreadNotifications()"></span>
            </button>
            <div class="notification-panel" x-show="notificationOpen" @click.outside="notificationOpen=false" x-cloak>
              <div class="notification-head"><strong>Notifications</strong><span x-text="notifications.length+' records'"></span></div>
              <div class="notification-empty" x-show="notifications.length===0">No activity yet.</div>
              <template x-for="item in notifications" :key="item.id">
                <div class="notification-item" :class="item.type">
                  <i :class="item.type==='success'?'fas fa-check-circle':item.type==='error'?'fas fa-times-circle':'fas fa-info-circle'"></i>
                  <div><strong x-text="item.message"></strong><small x-text="item.date"></small></div>
                </div>
              </template>
            </div>
          </div>
          <button class="topbar-btn" @click="go('profile')" style="overflow:hidden;padding:0;">
            <img :src="profileImg" style="width:42px;height:42px;object-fit:cover;border-radius:10px;" alt="">
          </button>
        </div>
      </div>

      <div class="content">
        <!-- SETTINGS -->
        <div x-show="page==='settings'">
          <div class="settings-hero">
            <img :src="profileImg" alt="Profile picture">
            <div>
              <span class="eyebrow">Account Settings</span>
              <h2 x-text="userName||'MotoMatch Rider'"></h2>
              <p x-text="userEmail||'Manage your MotoMatch account'"></p>
            </div>
          </div>

          <div class="settings-section">
            <h3>PROFILE PICTURE</h3>
            <div class="settings-action-row">
              <div>
                <div class="toggle-label">Add Profile Picture</div>
                <div class="toggle-sub">Upload a new image for your account.</div>
              </div>
              <label class="settings-file-btn">
                <i class="fas fa-camera"></i> Choose Photo
                <input type="file" accept="image/*" style="display:none" @change="onSettingsAvatarSelect($event)">
              </label>
            </div>
          </div>

          <div class="settings-section">
            <h3>APPEARANCE</h3>
            <div class="toggle-row">
              <div><div class="toggle-label">Dark Mode</div><div class="toggle-sub">Switch between dark and light theme.</div></div>
              <button class="toggle-btn" :class="darkMode?'on':''" @click="toggleDarkMode()"></button>
            </div>
          </div>

          <div class="settings-section">
            <h3>CHANGE PASSWORD</h3>
            <div class="form-group" style="margin-bottom:12px">
              <label class="form-label">NEW PASSWORD</label>
              <div class="input-wrap">
                <i class="fas fa-lock icon"></i>
                <i :class="showPw?'fas fa-eye':'fas fa-eye-slash'" class="eye" @click="showPw=!showPw"></i>
                <input class="form-input" :type="showPw?'text':'password'" x-model="newPw" placeholder="Enter new password">
              </div>
            </div>
            <button class="btn btn-primary" style="max-width:200px" @click="changePw()">CHANGE PASSWORD</button>
          </div>

          <div class="settings-section">
            <h3>ACCOUNT ACTIONS</h3>
            <div class="settings-buttons">
              <button class="settings-logout" @click="logout()"><i class="fas fa-sign-out-alt"></i> LOG OUT</button>
              <button class="settings-danger" @click="deleteAccount()"><i class="fas fa-user-slash"></i> DELETE ACCOUNT</button>
            </div>
          </div>

          <div class="settings-section">
            <h3>DATA</h3>
            <button class="settings-danger ghost" @click="clearHistory()">
              <i class="fas fa-trash-alt"></i> CLEAR SCAN HISTORY
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
