<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoMatch - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
</head>
<body data-page="dashboard">
<div x-data="motoApp()" x-init="init()" class="page">
  <!-- TOASTS -->
  <div class="toast-container">
    <template x-for="t in toasts" :key="t.id">
      <div class="toast" :class="t.type">
        <i :class="t.type==='success'?'fas fa-check-circle':t.type==='error'?'fas fa-times-circle':'fas fa-info-circle'"></i>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

  <div class="modal-bg" x-show="editModal" x-cloak>
    <div class="modal" @click.stop>
      <h2>Edit Profile</h2>
      <div class="form-group">
        <label class="form-label">PROFILE PHOTO</label>
        <div class="avatar-upload-wrap">
          <img :src="profileImg" alt="Profile photo" class="avatar-upload-img">
          <label class="avatar-upload-label">
            <i class="fas fa-camera"></i> Upload New Photo
            <input type="file" accept="image/*" style="display:none" @change="onAvatarSelect($event)">
          </label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">DISPLAY NAME</label>
        <div class="input-wrap"><i class="fas fa-user icon"></i><input class="form-input" x-model="editName" placeholder="Your name"></div>
      </div>
      <div class="form-group">
        <label class="form-label">PHONE NUMBER</label>
        <div class="input-wrap"><i class="fas fa-phone icon"></i><input class="form-input" x-model="editPhone" placeholder="09xxxxxxxxx"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" @click="editModal=false">Cancel</button>
        <button class="btn-save" @click="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="app-shell" x-cloak>
    <!-- Sidebar -->
    <div class="sidebar" :class="showMenu?'open':''">
      <div class="sidebar-head">
        <div class="sidebar-logo"><i class="fas fa-motorcycle"></i></div>
        <div class="sidebar-brand"><h2>MOTO</h2><p>MATCH</p></div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn" :class="page==='dashboard'?'active':''" @click="go('dashboard')"><i class="fas fa-home"></i> Dashboard</button>
        <button class="nav-btn" :class="page==='scanner'?'active':''" @click="go('scanner')"><i class="fas fa-camera"></i> Scan Parts</button>
        <button class="nav-btn" :class="page==='need'?'active':''" @click="go('need')"><i class="fas fa-cart-plus"></i> Need To Buy</button>
        <button class="nav-btn" :class="page==='broken'?'active':''" @click="go('broken')"><i class="fas fa-wrench"></i> Broken Parts</button>
        <button class="nav-btn" :class="page==='profile'?'active':''" @click="go('profile')"><i class="fas fa-user"></i> Profile</button>
        <button class="nav-btn" :class="page==='settings'?'active':''" @click="go('settings')"><i class="fas fa-cog"></i> Settings</button>
      </nav>
      <div class="sidebar-foot">
        <button class="btn-logout-side" @click="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div class="sidebar-overlay" :class="showMenu?'open':''" @click="showMenu=false"></div>

    <div class="main">
      <div class="topbar">
        <button class="btn-menu" @click="showMenu=!showMenu"><i class="fas fa-bars"></i></button>
        <span class="page-title" x-text="pageTitle()"></span>
        <div class="topbar-right">
          <button class="topbar-btn" @click="go('settings')"><i class="fas fa-bell"></i></button>
          <button class="topbar-btn" @click="go('profile')" style="overflow:hidden;padding:0;">
            <img :src="profileImg" style="width:42px;height:42px;object-fit:cover;border-radius:10px;" alt="">
          </button>
        </div>
      </div>

      <div class="content">
        <!-- DASHBOARD -->
        <div x-show="page==='dashboard'">
          <div class="metric-grid">
            <div class="metric-card">
              <i class="fas fa-motorcycle"></i>
              <span>Saved Unit</span>
              <strong x-text="unitName?unitName:'Not set'"></strong>
              <small x-text="yearModel?yearModel+' model year':'Add model year'"></small>
            </div>
            <div class="metric-card">
              <i class="fas fa-check-circle"></i>
              <span>Saved To Buy</span>
              <strong x-text="needItems.length"></strong>
              <small>Shop links saved for later</small>
            </div>
            <div class="metric-card">
              <i class="fas fa-chart-line"></i>
              <span>Latest Confidence</span>
              <strong x-text="latestConfidence()+'%'"></strong>
              <small>AI/fitment estimate</small>
            </div>
          </div>
          <div class="unit-card">
            <h3>EDIT UNIT / YEAR MODEL</h3>
            <div class="unit-inputs">
              <input x-model="unitName" placeholder="Unit Name (e.g. Honda CBR 150R)" @change="save()">
              <input x-model="yearModel" placeholder="Year Model (e.g. 2022)" @change="save()">
            </div>
            <button class="unit-save-btn" @click="save()"><i class="fas fa-save"></i> SAVE UNIT DETAILS</button>
          </div>
          <div class="dash-grid">
            <div class="bike-card">
              <div class="bike-img" style="position:relative;">
                <img :src="unitImg" alt="Motorcycle" style="width:100%;height:100%;object-fit:cover;">
                <label style="position:absolute;bottom:10px;right:10px;width:44px;height:44px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px;box-shadow:0 4px 12px rgba(37,99,235,.3);">
                  <i class="fas fa-camera"></i>
                  <input type="file" accept="image/*" style="display:none" @change="onUnitImageSelect($event)">
                </label>
              </div>
              <div class="bike-info">
                <div class="bike-name" x-text="unitName||'Your Motorcycle'"></div>
                <div class="bike-sub" x-text="yearModel?yearModel+' EDITION':'Your Edition'"></div>
                <div class="eco-badge">
                  <div class="eco-icon"><i class="fas fa-leaf"></i></div>
                  <div class="eco-text">
                    <h4>Eco-Savings</h4>
                    <p>Finding the right parts keeps your motor on the road and out of the landfill.</p>
                  </div>
                </div>
              </div>
            </div>
            <div class="right-panel">
              <button class="scan-big-btn" @click="go('scanner')">
                <i class="fas fa-camera"></i> Scan Part
              </button>
              <div class="recent-card">
                <div class="recent-head">
                  <span>RECENT SCANS</span>
                  <a href="#" @click.prevent="go('scanner')">View all →</a>
                </div>
                <div x-show="scanHistory.length===0" style="padding:20px;font-size:13px;color:var(--muted);text-align:center;">No scans yet. Tap Scan a Part!</div>
                <template x-for="item in scanHistory.slice().reverse().slice(0,4)" :key="item.id">
                  <div class="recent-item" :class="item.today?'today':''">
                    <div class="recent-item-left">
                      <div class="recent-thumb"><i class="fas fa-cube"></i></div>
                      <div>
                        <div class="recent-title" x-text="item.partName"></div>
                        <div class="recent-time" x-text="item.date"></div>
                      </div>
                    </div>
                    <button class="recent-delete" @click="removeHistory(item.id)"><i class="fas fa-trash-alt"></i></button>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
